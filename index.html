<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>   
    <title>BOBOOK</title>
</head>
<body>
    <div class="header">
        <div class="logo">
            <img src="images/BuBook.png" alt="Logo BuBook">
        </div>
        <div class="nav">
            <ul>
                <li>Mi Biblioteca</li>
                <li>Libros leidos</li>
                <li>Pendientes</li>
                <li>Mi cuenta</li>
                <li><a class="github" href="https://github.com/IgnacioCastroT/Project-Library">Github Repository</a></li>
            </ul>
        </div>
    </div>

    <div class="main">
        <div class="menu_principal">
            <div class="menu_izquierda">
                <h1>Bienvenidos a BOBOOK</h1>
                <h2>Organiza tus libros de forma sencilla</h2>
                <h3>Agrega, marca o elimina libros que hayas leido o que quieras leer</h3>
                <a href="#books"><button id="bottone1" class="btn start">Ver Biblioteca</button></a>
            </div>
            <div class="menu_derecha">
                <img class="img-main" src="images/Diversidad y lectura en biblioteca.png" alt="Alguna buena imagen">
            </div>
        </div>
        
        <div id="books" class="books"></div>

        <a href="#books">
        <button class="Btn-add">
            <div class="sign">+</div>
            <div class="text">Añadir un libro</div>
        </button>
        </a>





        
    </div>

    <!-- From Uiverse.io by mi-series --> 
    <div class="container-form">
        <div class="form_area">
            <p class="title-form">Nuevo Libro</p>
            <form action="">
                <div class="form_group">
                    <label class="sub_title" for="titulo">Titulo</label>
                    <input placeholder="Ingresa el titulo del libro" id="titulo" class="form_style" type="text" required>
                </div>
                <div class="form_group">
                    <label class="sub_title" for="autor">Autor</label>
                    <input placeholder="¿Quien es el autor(a) del libro?" id="autor" class="form_style" type="text" required>
                </div>
                <div class="form_group">
                    <label class="sub_title" for="pages">N° Paginas</label>
                    <input required placeholder="Ingresa el numero de paginas del libro" id="pages" class="form_style" type="number">
                </div>

                <div class="form_group checkbox">
                    <label class="sub_title" for="read">¿Libro leido?</label>
                    <input placeholder="Ingresa el numero de paginas del libro" id="read" type="checkbox">
                </div>

                <div class="form_btn">
                    <button type="submit" class="btn-add form-agregar">Agregar</button>
                    <button class="btn-add form-cancelar">Cancelar</button>
                </div>
            </form>
        </div>
    </div>


</body>
</html>
